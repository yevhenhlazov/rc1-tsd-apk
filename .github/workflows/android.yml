name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # дозволяє запускати збірку вручну з вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Target SDK 34 (сучасний — щоб Play Захист не блокував установку)
        run: |
          sed -i 's/targetSdkVersion *=.*/targetSdkVersion = 34/' android/variables.gradle || true
          cat android/variables.gradle

      - name: Inject Bluetooth permissions
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/app/src/main/AndroidManifest.xml')
          x = p.read_text(encoding='utf-8')
          perms = '''
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
          '''
          if 'BLUETOOTH_CONNECT' not in x:
              x = re.sub(r'(<manifest[^>]*>)', r'\1' + perms, x, count=1)
              p.write_text(x, encoding='utf-8')
              print('permissions injected')
          else:
              print('already present')
          PY

      - name: Patch MainActivity (runtime BT permission request)
        run: |
          MA=$(find android/app/src/main/java -name MainActivity.java | head -n1)
          echo "MainActivity: $MA"
          PKG=$(grep -oP 'package\s+\K[\w.]+' "$MA")
          echo "Package: $PKG"
          cat > "$MA" <<JAVA
          package $PKG;

          import android.os.Build;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  if (Build.VERSION.SDK_INT >= 31) {
                      try {
                          requestPermissions(new String[]{
                              "android.permission.BLUETOOTH_CONNECT",
                              "android.permission.BLUETOOTH_SCAN"
                          }, 100);
                      } catch (Exception e) {}
                  }
              }
          }
          JAVA
          echo "---- patched MainActivity ----"
          cat "$MA"

      - name: Sync
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rc1-tsd-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
